{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | EduPortal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body class="bg-primary">
    <div class="auth-page">
        <div class="auth-card">
            <div class="text-center mb-4">
                <div class="d-inline-flex align-items-center justify-content-center bg-primary text-white p-3 rounded-3 mb-3 shadow-sm">
                    <i data-lucide="key-round" style="width: 36px; height: 36px;"></i>
                </div>
                <h4 class="fw-bold mb-1">Forgot your password?</h4>
                <p class="text-muted small">Enter your account email and we'll send you a link to reset your password.</p>
            </div>

            {% if form.errors %}
                <div class="alert alert-danger border-0 rounded-3 mb-3" role="alert">
                    Please enter a valid email address registered with your account.
                </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="mb-4">
                    <label for="id_email" class="form-label small fw-semibold text-secondary">Email address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 border-color"><i data-lucide="mail" style="width: 18px; height: 18px; color: var(--text-muted);"></i></span>
                        <input type="email" name="email" autofocus maxlength="254" class="form-control border-start-0 border-color" required id="id_email" placeholder="you@example.com">
                    </div>
                </div>
                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-primary">Send Reset Link</button>
                </div>
            </form>

            <div class="text-center mt-4">
                <a href="{% url 'login' %}" class="small fw-semibold text-decoration-none">
                    <i data-lucide="arrow-left" style="width: 14px; height: 14px; vertical-align: text-bottom;"></i>
                    Back to login
                </a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
