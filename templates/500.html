<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error (500) | EduPortal</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-card {
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 48px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.05);
        }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="d-inline-flex align-items-center justify-content-center bg-danger bg-opacity-10 text-danger p-3 rounded-circle mb-4" style="width: 72px; height: 72px;">
            <i data-lucide="shield-alert" style="width: 36px; height: 36px;"></i>
        </div>
        <h1 class="fw-extrabold text-danger mb-2" style="font-size: 3.5rem; letter-spacing: -1px;">500</h1>
        <h4 class="fw-bold mb-3">Internal Server Error</h4>
        <p class="text-secondary small mb-4">Something went wrong on our end. Our administrators have been notified. Please try reloading the page later.</p>
        <div class="d-grid">
            <a href="/" class="btn btn-primary rounded-pill py-2" style="background-color: #6366f1; border-color: #6366f1; box-shadow: 0 4px 12px 0 rgba(99, 102, 241, 0.2);">Back to Home</a>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
